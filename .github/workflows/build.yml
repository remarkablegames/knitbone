name: build
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      variant:
        description: Build variant
        type: choice
        options:
          - demo
          - full

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Ren'Py
        uses: remarkablegames/setup-renpy@v2
        with:
          cli-version: 8.4.1
          web: true

      - name: Delete unnecessary files
        run: >
          find .
          ! -name "icon.*"
          ! -name "progressive_download.txt"
          ! -name "web-*"
          ! -path "*/.*"
          ! -path "*game*"
          -delete

      - name: Set build variant
        if: github.event_name == 'workflow_dispatch'
        run: |
          sed -i "s/^define build\.variant = .*/define build.variant = \"${BUILD_VARIANT}\"/" game/options.rpy
          grep -Fx "define build.variant = \"${BUILD_VARIANT}\"" game/options.rpy
        env:
          BUILD_VARIANT: ${{ inputs.variant }}

      - name: Build desktop distributions
        if: github.event_name == 'workflow_dispatch'
        run: renpy-launcher distribute . --dest ../dists

      - name: Build web
        run: renpy-launcher web_build . --destination web

      - name: Update presplash image
        run: |
          rm web/web-presplash.jpg
          mv web-presplash.webp web
          grep -lr web-presplash.jpg web | xargs sed -i 's/web-presplash.jpg/web-presplash.webp/g'

      - name: Deploy site
        if: github.event_name != 'workflow_dispatch' && github.ref_name == 'master'
        uses: remarkablemark/gitploy-action@v1
        with:
          directory: web

      - name: Upload web artifact
        if: github.event_name != 'workflow_dispatch' && github.ref_name == 'master'
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: web

      - name: Prepare distribution artifact
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir artifact
          cp ../dists/*-win.zip artifact
          cp ../dists/*-linux.tar.bz2 artifact
          cp ../dists/*-mac.zip artifact
          cp -R web artifact

      - name: Upload distribution artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: distributions-${{ inputs.variant }}
          path: artifact
